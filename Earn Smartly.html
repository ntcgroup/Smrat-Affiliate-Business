<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Smartly | Professional Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Poppins:wght@300;400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f4f7f6; }
        .brand-font { font-family: 'Montserrat', sans-serif; }
        .service-card { transition: 0.3s; border: 1px solid #e2e8f0; border-radius: 1.5rem; overflow: hidden; background: white; }
        .service-card:hover { transform: translateY(-10px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border-color: #3b82f6; }
        .admin-sidebar { transition: 0.4s; transform: translateX(100%); z-index: 1000; }
        .admin-sidebar.active { transform: translateX(0); }
    </style>
</head>
<body>

    <header class="bg-white sticky top-0 z-40 shadow-md border-b-2 border-orange-500 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div id="agLogo" class="w-14 h-14 bg-blue-900 rounded-2xl flex items-center justify-center text-white font-black text-2xl shadow-lg">E</div>
                <div>
                    <h1 id="agName" class="text-2xl font-black text-blue-900 brand-font uppercase">EARN SMARTLY AGENCY</h1>
                    <p class="text-[10px] font-bold text-gray-400 tracking-widest">DIGITAL FINANCIAL PARTNER</p>
                </div>
            </div>
            <button onclick="toggleAdmin()" class="bg-blue-50 text-blue-900 p-3 rounded-xl font-bold border border-blue-200">
                <i class="fa-solid fa-lock"></i> Admin
            </button>
        </div>
    </header>

    <div class="bg-blue-900 py-12 text-center text-white px-6">
        <h2 class="text-3xl md:text-5xl font-black brand-font mb-4">FINANCIAL SERVICES PORTAL</h2>
        <p class="text-blue-200 text-sm">Apni manpasand service chunein aur apply karein.</p>
    </div>

    <main class="max-w-7xl mx-auto p-6 md:p-10">
        <div id="mainGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <aside id="adminPanel" class="fixed inset-y-0 right-0 w-full md:w-[500px] bg-white shadow-2xl admin-sidebar overflow-y-auto p-6">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h2 class="text-xl font-black text-blue-900 tracking-tighter uppercase">Admin Control Panel</h2>
            <button onclick="toggleAdmin()" class="text-3xl text-red-500">&times;</button>
        </div>

        <div id="authBox" class="space-y-4">
            <p class="text-sm font-bold text-gray-500">Enter Admin Password to Edit Services:</p>
            <input type="password" id="adminPass" placeholder="Password: admin123" class="w-full p-4 border-2 rounded-2xl outline-none focus:border-blue-500">
            <button onclick="checkAdmin()" class="w-full bg-blue-900 text-white font-bold py-4 rounded-2xl shadow-lg">Login</button>
        </div>

        <div id="settingsBox" class="hidden space-y-8">
            <div class="bg-gray-50 p-4 rounded-2xl border">
                <h3 class="font-bold text-xs text-blue-800 mb-2">AGENCY SETTINGS</h3>
                <input type="text" id="newAgName" placeholder="Agency Name" class="w-full p-3 border rounded-xl mb-2">
                <button onclick="saveAgencyName()" class="w-full bg-blue-600 text-white py-2 rounded-lg text-xs font-bold uppercase">Update Branding</button>
            </div>

            <div class="space-y-4">
                <h3 class="font-bold text-xs text-gray-500 uppercase border-b pb-1">Edit All Categories</h3>
                <div id="editorList" class="space-y-6">
                    </div>
            </div>
        </div>
    </aside>

    <div id="leadModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[100] p-4 backdrop-blur-sm">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-md w-full shadow-2xl relative border-t-8 border-orange-500">
            <h3 class="text-2xl font-black text-blue-900 mb-2">Interset Form</h3>
            <p class="text-xs text-gray-500 mb-6 uppercase">Service: <span id="targetService" class="text-blue-600 font-bold"></span></p>
            <form onsubmit="handleLead(event)" class="space-y-4">
                <input type="text" id="lName" placeholder="Full Name" required class="w-full p-4 bg-gray-50 border rounded-2xl">
                <input type="number" id="lMob" placeholder="Mobile Number" required class="w-full p-4 bg-gray-50 border rounded-2xl">
                <input type="email" id="lEmail" placeholder="Email Address" required class="w-full p-4 bg-gray-50 border rounded-2xl">
                <button type="submit" class="w-full bg-blue-900 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-black transition">SUBMIT & GET LINK</button>
            </form>
            <button onclick="closeLead()" class="absolute top-4 right-4 text-gray-400 text-2xl">&times;</button>
        </div>
    </div>

    <footer class="bg-white py-12 border-t-2 border-orange-400 text-center">
        <h2 class="text-2xl font-black text-slate-800 brand-font uppercase">EARN <span class="text-blue-600">SMARTLY</span></h2>
        <p class="text-gray-400 text-[10px] tracking-[0.5em] mt-2">© 2026 DIGITAL AFFILIATE NETWORK</p>
    </footer>

    <script>
        // AAPKI SARI FULL CATEGORIES (Initial Data)
        let appData = {
            agencyName: "EARN SMARTLY AGENCY",
            services: [
                { id: 1, topic: "Saving Account", img: "https://images.unsplash.com/photo-1601597111158-2fcee29e40d8?w=400", desc: "Digital zero balance accounts from top banks.", link: "#" },
                { id: 2, topic: "Current Account", img: "https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=400", desc: "Best business accounts for high transactions.", link: "#" },
                { id: 3, topic: "Demat Account", img: "https://images.unsplash.com/photo-1611974717482-aa4d69956417?w=400", desc: "Start stock market trading instantly.", link: "#" },
                { id: 4, topic: "Credit Card", img: "https://images.unsplash.com/photo-1556742563-8018218146aa?w=400", desc: "Get life-time free cards with cashback.", link: "#" },
                { id: 5, topic: "EMI Card", img: "https://images.unsplash.com/photo-1563013544-824ae1b704d3?w=400", desc: "Easy shopping on no-cost EMIs.", link: "#" },
                { id: 6, topic: "Personal Loan", img: "https://images.unsplash.com/photo-1579621970795-87faff2f9050?w=400", desc: "Instant funds for your personal needs.", link: "#" },
                { id: 7, topic: "Business Loan", img: "https://images.unsplash.com/photo-1454165833767-027ffea9e77b?w=400", desc: "Boost your business with collateral free loans.", link: "#" },
                { id: 8, topic: "Car Loan", img: "https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?w=400", desc: "Lowest ROI for your dream car.", link: "#" },
                { id: 9, topic: "Health Insurance", img: "https://images.unsplash.com/photo-1505751172876-fa1923c5c528?w=400", desc: "Safety for your family medical bills.", link: "#" },
                { id: 10, topic: "Car Insurance", img: "https://images.unsplash.com/photo-1450101499163-c8848c66ca85?w=400", desc: "Protect your vehicle from accidents.", link: "#" },
                { id: 11, topic: "Investment", img: "https://images.unsplash.com/photo-1534951009808-dfd1562da1f2?w=400", desc: "Fixed Deposits and Mutual Funds.", link: "#" },
                { id: 12, topic: "Other Services", img: "https://images.unsplash.com/photo-1450101499163-c8848c66ca85?w=400", desc: "GST, ITR and other financial work.", link: "#" }
            ]
        };

        let currentLink = "";

        // UI RENDERING
        function renderUI() {
            document.getElementById('agName').innerText = appData.agencyName;
            document.getElementById('agLogo').innerText = appData.agencyName.charAt(0);
            
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = "";
            appData.services.forEach((s, idx) => {
                grid.innerHTML += `
                    <div class="service-card flex flex-col">
                        <img src="${s.img}" class="w-full h-44 object-cover">
                        <div class="p-6 flex flex-col flex-grow">
                            <h3 class="text-xl font-black text-slate-800 mb-2">${s.topic}</h3>
                            <p class="text-xs text-gray-500 mb-6 flex-grow">${s.desc}</p>
                            <button onclick="openLead('${s.topic}', '${s.link}')" class="w-full bg-blue-900 text-white font-bold py-3 rounded-xl hover:bg-orange-500 transition">Apply Now</button>
                        </div>
                    </div>
                `;
            });
        }

        // ADMIN PANEL LOGIC
        function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('active'); }

        function checkAdmin() {
            if(document.getElementById('adminPass').value === "admin123") {
                document.getElementById('authBox').classList.add('hidden');
                document.getElementById('settingsBox').classList.remove('hidden');
                loadEditor();
            } else { alert("Wrong Password!"); }
        }

        function loadEditor() {
            const list = document.getElementById('editorList');
            list.innerHTML = "";
            appData.services.forEach((s, idx) => {
                list.innerHTML += `
                    <div class="p-4 bg-blue-50 border rounded-2xl space-y-2">
                        <p class="font-bold text-[10px] text-blue-900">ID: ${s.id} - ${s.topic}</p>
                        <input type="text" value="${s.topic}" oninput="updateData(${idx}, 'topic', this.value)" class="w-full p-2 text-xs border rounded" placeholder="Category Name">
                        <input type="text" value="${s.img}" oninput="updateData(${idx}, 'img', this.value)" class="w-full p-2 text-xs border rounded" placeholder="Image Link">
                        <textarea oninput="updateData(${idx}, 'desc', this.value)" class="w-full p-2 text-xs border rounded">${s.desc}</textarea>
                        <input type="text" value="${s.link}" oninput="updateData(${idx}, 'link', this.value)" class="w-full p-2 text-xs border rounded" placeholder="Affiliate Link">
                    </div>
                `;
            });
        }

        function updateData(idx, key, val) { appData.services[idx][key] = val; renderUI(); }
        function saveAgencyName() { 
            let name = document.getElementById('newAgName').value;
            if(name) { appData.agencyName = name; renderUI(); alert("Branding Updated!"); }
        }

        // LEAD MODAL LOGIC
        function openLead(topic, link) {
            currentLink = link;
            document.getElementById('targetService').innerText = topic;
            document.getElementById('leadModal').style.display = 'flex';
        }
        function closeLead() { document.getElementById('leadModal').style.display = 'none'; }

        function handleLead(e) {
            e.preventDefault();
            const data = {
                Agency: appData.agencyName,
                Service: document.getElementById('targetService').innerText,
                Name: document.getElementById('lName').value,
                Mobile: document.getElementById('lMob').value,
                Email: document.getElementById('lEmail').value,
                Time: new Date().toLocaleString()
            };
            console.log("Saving Lead to Admin...", data);
            alert("Data Recorded! Redirecting to Affiliate Link...");
            window.location.href = currentLink;
        }

        window.onload = renderUI;
    </script>
</body>
</html>
